name: Deploy Fake News App to AKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: fake-news-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Convert username to lowercase for Docker Hub compliance
          USER_LOWER=$(echo "${{ env.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$USER_LOWER/${{ env.IMAGE_NAME }}:${{ github.sha }}
          LATEST_TAG=$USER_LOWER/${{ env.IMAGE_NAME }}:latest
          
          echo "Building image: $IMAGE_TAG"
          
          docker build -t $IMAGE_TAG -f docker/Dockerfile .
          docker tag $IMAGE_TAG $LATEST_TAG
          
          docker push $IMAGE_TAG
          docker push $LATEST_TAG
          
          # Store the lowercase tag for the next steps
          echo "FULL_IMAGE_NAME=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Configure Kubernetes Context (Kubeconfig)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Substitute Image in Manifests
        run: |
          sed -i "s|DOCKER_IMAGE_PLACEHOLDER|${{ env.FULL_IMAGE_NAME }}|g" k8s/deployment.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/fake-news-app
