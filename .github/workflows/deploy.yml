name: CI - Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: fake-news-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Convert username to lowercase for Docker Hub compliance
          USER_LOWER=$(echo "${{ env.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$USER_LOWER/${{ env.IMAGE_NAME }}:latest
          
          echo "Building and Pushing image: $IMAGE_TAG"
          
          docker build -t $IMAGE_TAG -f docker/Dockerfile .
          docker push $IMAGE_TAG
