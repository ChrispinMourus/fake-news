name: Deploy Fake News App to AKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: fake-news-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          image_tag=$DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.sha }}
          latest_tag=$DOCKERHUB_USERNAME/$IMAGE_NAME:latest
          
          docker build -t $image_tag -f docker/Dockerfile .
          docker tag $image_tag $latest_tag
          
          docker push $image_tag
          docker push $latest_tag

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Substitute Image in Manifests
        run: |
          image_full_path=$DOCKERHUB_USERNAME/$IMAGE_NAME:${{ github.sha }}
          sed -i "s|DOCKER_IMAGE_PLACEHOLDER|$image_full_path|g" k8s/deployment.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/fake-news-app
